services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password_root_anda
      MYSQL_DATABASE: lms_mesin_db
      MYSQL_USER: user_anda
      MYSQL_PASSWORD: password_anda
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - lms_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: password_root_anda
    ports:
      - "8080:80"
    depends_on:
      - mariadb
    networks:
      - lms_network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: always
    command: tunnel --no-autoupdate run --token eyJhIjoiODNhYzFhZDljOGY0NmFkYzM4MTFhYmYwYjQwY2Q4NzciLCJ0IjoiM2E0OTllMzQtODA2Yy00NDI1LWIwY2EtMDg5ZmZlNDZkYjljIiwicyI6Ik5qZGtaRFZqWlRrdFlUQXhZeTAwTlROakxUZzNZV1l0T0RnNU5EQTJPR00yWkRkaiJ9
    networks:
      - lms_network

networks:
  lms_network:
    name: mariadb_default
    driver: bridge

volumes:
  mariadb_data:
