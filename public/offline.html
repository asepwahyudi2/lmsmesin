<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — LMS SMK YPWKS</title>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .icon {
      font-size: 48px;
      color: #f59e0b;
      margin-bottom: 15px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 10px 0;
    }
    p {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 20px 0;
    }
    button {
      background-color: #f59e0b;
      color: #0f172a;
      border: none;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #d97706;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔌</div>
    <h1>Koneksi Terputus</h1>
    <p>Maaf, Anda sedang offline. Silakan periksa koneksi internet Anda di area bengkel dan coba muat ulang halaman.</p>
    <button onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
